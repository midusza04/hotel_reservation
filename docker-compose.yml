services:
  ray-head:
    build: .
    container_name: ray-head
    hostname: ray-head
    shm_size: "1gb"
    ports:
      - "8000:8000"   # FastAPI
      - "8265:8265"   # Ray Dashboard
      - "6379:6379"   # Ray GCS
    volumes:
      - ./app:/app
      - ./tests:/tests
      - ./pytest.ini:/pytest.ini
    environment:
      - DATABASE_URL=postgresql+psycopg://postgres:postgres@db:5432/ray_hotel
      - RAY_ADDRESS=auto
    depends_on:
      - db
    restart: unless-stopped

  ray-worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    shm_size: "1gb"
    volumes:
      - ./app:/app
    environment:
      - DATABASE_URL=postgresql+psycopg://postgres:postgres@db:5432/ray_hotel
    depends_on:
      - ray-head
    deploy:
      replicas: 2
    restart: unless-stopped

  frontend:
    image: nginx:1.27-alpine
    container_name: ray-hotel-frontend
    ports:
      - "8080:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - ray-head
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    container_name: ray-hotel-db
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=ray_hotel
    ports:
      - "5432:5432"
    volumes:
      - ray-hotel-db:/var/lib/postgresql/data
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: ray-hotel-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    depends_on:
      - ray-head
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.0.0
    container_name: ray-hotel-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  ray-hotel-db:
  prometheus-data:
  grafana-data: