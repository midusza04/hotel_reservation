services:
  backend:
    build: .
    container_name: ray-hotel-backend
    shm_size: "1gb"
    ports:
      - "8000:8000"   # FastAPI
      - "8265:8265"   # Ray Dashboard
    volumes:
      - ./app:/app
    environment:
      - DATABASE_URL=postgresql+psycopg://postgres:postgres@db:5432/ray_hotel
    depends_on:
      - db
    restart: unless-stopped

  frontend:
    image: nginx:1.27-alpine
    container_name: ray-hotel-frontend
    ports:
      - "8080:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
    depends_on:
      - backend
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    container_name: ray-hotel-db
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=ray_hotel
    ports:
      - "5432:5432"
    volumes:
      - ray-hotel-db:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  ray-hotel-db: