<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
    <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
  </marker>
  <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
    <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#0f172a" flood-opacity="0.14"/>
  </filter>
</defs>
<rect width="100%" height="100%" rx="24" fill="#f8fafc"/>
<text x="40" y="52" font-family="Segoe UI, Arial" font-size="30" font-weight="700" fill="#0f172a">Przeplyw anulowania rezerwacji</text>
<rect x="80" y="120" width="190" height="80" rx="18" fill="#dbeafe" stroke="#3b82f6" stroke-width="2" filter="url(#shadow)"/>
<text x="98" y="152" font-family="Segoe UI, Arial" font-size="19" font-weight="700" fill="#0f172a">1. User/SPA</text>
<text x="98" y="180" font-family="Segoe UI, Arial" font-size="15" fill="#475569">Cancel booking</text>
<rect x="330" y="120" width="205" height="80" rx="18" fill="#e0f2fe" stroke="#0284c7" stroke-width="2" filter="url(#shadow)"/>
<text x="348" y="152" font-family="Segoe UI, Arial" font-size="19" font-weight="700" fill="#0f172a">2. FastAPI</text>
<text x="348" y="180" font-family="Segoe UI, Arial" font-size="15" fill="#475569">JWT + owner check</text>
<rect x="610" y="105" width="250" height="110" rx="18" fill="#ede9fe" stroke="#8b5cf6" stroke-width="2" filter="url(#shadow)"/>
<text x="628" y="137" font-family="Segoe UI, Arial" font-size="19" font-weight="700" fill="#0f172a">3. Coordinator</text>
<text x="628" y="165" font-family="Segoe UI, Arial" font-size="15" fill="#475569">validate reservation</text>
<text x="628" y="187" font-family="Segoe UI, Arial" font-size="15" fill="#475569">calculate refund</text>
<rect x="900" y="95" width="215" height="90" rx="18" fill="#f1f5f9" stroke="#64748b" stroke-width="2" filter="url(#shadow)"/>
<text x="918" y="127" font-family="Segoe UI, Arial" font-size="19" font-weight="700" fill="#0f172a">4. Inventory</text>
<text x="918" y="155" font-family="Segoe UI, Arial" font-size="15" fill="#475569">cancel_reservation</text>
<rect x="900" y="245" width="215" height="90" rx="18" fill="#dcfce7" stroke="#22c55e" stroke-width="2" filter="url(#shadow)"/>
<text x="918" y="277" font-family="Segoe UI, Arial" font-size="19" font-weight="700" fill="#0f172a">5. HotelActor</text>
<text x="918" y="305" font-family="Segoe UI, Arial" font-size="15" fill="#475569">status cancelled</text>
<text x="918" y="327" font-family="Segoe UI, Arial" font-size="15" fill="#475569">available += 1</text>
<rect x="610" y="425" width="250" height="90" rx="18" fill="#dcfce7" stroke="#16a34a" stroke-width="2" filter="url(#shadow)"/>
<text x="628" y="457" font-family="Segoe UI, Arial" font-size="19" font-weight="700" fill="#0f172a">6. History + DB</text>
<text x="628" y="485" font-family="Segoe UI, Arial" font-size="15" fill="#475569">status cancelled</text>
<text x="628" y="507" font-family="Segoe UI, Arial" font-size="15" fill="#475569">refund fields</text>
<rect x="330" y="425" width="205" height="90" rx="18" fill="#fef3c7" stroke="#f59e0b" stroke-width="2" filter="url(#shadow)"/>
<text x="348" y="457" font-family="Segoe UI, Arial" font-size="19" font-weight="700" fill="#0f172a">7. Audit + Metrics</text>
<text x="348" y="485" font-family="Segoe UI, Arial" font-size="15" fill="#475569">RESERVATION_CANCELLED</text>
<rect x="80" y="425" width="190" height="90" rx="18" fill="#e0f2fe" stroke="#0284c7" stroke-width="2" filter="url(#shadow)"/>
<text x="98" y="457" font-family="Segoe UI, Arial" font-size="19" font-weight="700" fill="#0f172a">8. Response</text>
<text x="98" y="485" font-family="Segoe UI, Arial" font-size="15" fill="#475569">refund_percent</text>
<text x="98" y="507" font-family="Segoe UI, Arial" font-size="15" fill="#475569">refund_amount</text>
