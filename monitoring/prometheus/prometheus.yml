global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers: []

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: ray_hotel_backend
    static_configs:
      - targets:
          - ray-head:8000
    metrics_path: /metrics

  - job_name: ray_dashboard
    static_configs:
      - targets:
          - ray-head:8265
    metrics_path: /metrics
