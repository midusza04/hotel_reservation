<svg xmlns="http://www.w3.org/2000/svg" width="950" height="814" viewBox="0 0 950 814">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
    <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
  </marker>
  <filter id="shadow" x="-8%" y="-8%" width="120%" height="130%">
    <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#0f172a" flood-opacity="0.10"/>
  </filter>
</defs>
<rect width="100%" height="100%" rx="20" fill="#f8fafc"/>
<text x="40" y="50" font-family="Segoe UI, Arial" font-size="26" font-weight="700" fill="#0f172a">Normalny przeplyw rezerwacji (Happy Path)</text>
<rect x="44" y="78" width="148" height="72" rx="12" fill="#dbeafe" stroke="#3b82f6" stroke-width="2" filter="url(#shadow)"/>
<text x="58" y="104" font-family="Segoe UI,Arial" font-size="16" font-weight="700" fill="#0f172a">User / SPA</text>
<text x="58" y="124" font-family="Segoe UI,Arial" font-size="13" fill="#475569">wybiera pokoj</text>
<rect x="252" y="78" width="190" height="72" rx="12" fill="#e0f2fe" stroke="#0284c7" stroke-width="2" filter="url(#shadow)"/>
<text x="266" y="104" font-family="Segoe UI,Arial" font-size="16" font-weight="700" fill="#0f172a">FastAPI</text>
<text x="266" y="124" font-family="Segoe UI,Arial" font-size="13" fill="#475569">sprawdza JWT</text>
<rect x="504" y="68" width="252" height="92" rx="12" fill="#ede9fe" stroke="#8b5cf6" stroke-width="2" filter="url(#shadow)"/>
<text x="518" y="94" font-family="Segoe UI,Arial" font-size="16" font-weight="700" fill="#0f172a">BookingCoordinator</text>
<text x="518" y="114" font-family="Segoe UI,Arial" font-size="13" fill="#475569">saga · idempotency</text>
<path d="M 192,114 L 252,114" stroke="#475569" stroke-width="2" fill="none" marker-end="url(#arrow)"/><rect x="186" y="90" width="72" height="22" rx="11" fill="#fff" stroke="#dde2ee" stroke-width="1.5"/><text x="222" y="107" text-anchor="middle" font-family="Segoe UI,Arial" font-size="12" fill="#334155">HTTP</text>
<path d="M 442,114 L 504,114" stroke="#475569" stroke-width="2" fill="none" marker-end="url(#arrow)"/><rect x="436" y="90" width="72" height="22" rx="11" fill="#fff" stroke="#dde2ee" stroke-width="1.5"/><text x="472" y="107" text-anchor="middle" font-family="Segoe UI,Arial" font-size="12" fill="#334155">book_room()</text>
<rect x="96" y="200" width="750" height="106" rx="12" fill="#e0f2fe" stroke="#0284c7" stroke-width="2" filter="url(#shadow)"/>
<text x="110" y="226" font-family="Segoe UI,Arial" font-size="16" font-weight="700" fill="#0f172a">1  hold pokoju</text>
<text x="110" y="246" font-family="Segoe UI,Arial" font-size="13" fill="#475569">InventoryActor.hold_room() → HotelActor.try_hold()</text>
<text x="110" y="265" font-family="Segoe UI,Arial" font-size="13" fill="#475569">dostepnosc -= 1 · generowany hold_id · TTL = 300 s</text>
<path d="M 471,160 L 471,200" stroke="#475569" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
<rect x="96" y="320" width="750" height="106" rx="12" fill="#fee2e2" stroke="#ef4444" stroke-width="2" filter="url(#shadow)"/>
<text x="110" y="346" font-family="Segoe UI,Arial" font-size="16" font-weight="700" fill="#0f172a">2  platnosc</text>
<text x="110" y="366" font-family="Segoe UI,Arial" font-size="13" fill="#475569">PaymentActor.process_payment(user_id, amount, method)</text>
<text x="110" y="385" font-family="Segoe UI,Arial" font-size="13" fill="#475569">kwota = cena_pokoju × liczba_nocy · metoda: card / cash</text>
<path d="M 471,306 L 471,320" stroke="#475569" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
<rect x="96" y="440" width="750" height="106" rx="12" fill="#dcfce7" stroke="#16a34a" stroke-width="2" filter="url(#shadow)"/>
<text x="110" y="466" font-family="Segoe UI,Arial" font-size="16" font-weight="700" fill="#0f172a">3  potwierdzenie hold</text>
<text x="110" y="486" font-family="Segoe UI,Arial" font-size="13" fill="#475569">InventoryActor.confirm_hold() → HotelActor.confirm_hold()</text>
<text x="110" y="505" font-family="Segoe UI,Arial" font-size="13" fill="#475569">hold usuwany · generowany reservation_id</text>
<path d="M 471,426 L 471,440" stroke="#475569" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
<rect x="96" y="560" width="750" height="106" rx="12" fill="#fef9c3" stroke="#f59e0b" stroke-width="2" filter="url(#shadow)"/>
<text x="110" y="586" font-family="Segoe UI,Arial" font-size="16" font-weight="700" fill="#0f172a">4  zapis i zdarzenia</text>
<text x="110" y="606" font-family="Segoe UI,Arial" font-size="13" fill="#475569">ReservHistory.add_reservation() + DB save_reservation()</text>
<text x="110" y="625" font-family="Segoe UI,Arial" font-size="13" fill="#475569">AuditLog.log(RESERVATION_CREATED) + MetricsActor.inc_reservation()</text>
<path d="M 471,546 L 471,560" stroke="#475569" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
<rect x="96" y="694" width="750" height="88" rx="12" fill="#e0f2fe" stroke="#0284c7" stroke-width="2" filter="url(#shadow)"/>
<text x="110" y="720" font-family="Segoe UI,Arial" font-size="16" font-weight="700" fill="#0f172a">5  odpowiedz</text>
<text x="110" y="740" font-family="Segoe UI,Arial" font-size="13" fill="#475569">ReservationResponse(ok=True, reservation_id, payment_id, total_price)</text>
<path d="M 471,666 L 471,694" stroke="#475569" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
</svg>