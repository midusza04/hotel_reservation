groups:
  - name: ray_hotel
    rules:
      - alert: HighTimeoutRate
        expr: |
          rate(hotel_http_requests_total{status_code="504"}[5m]) > 0.05
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High 504 timeout rate (> 5%)"
          description: "More than 5% of requests are timing out in the last 5 minutes."

      - alert: ReservationFailureRate
        expr: |
          rate(hotel_reservations_total{status="failed"}[5m])
          /
          (rate(hotel_reservations_total[5m]) + 0.001)
          > 0.2
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High reservation failure rate (> 20%)"

      - alert: PaymentFailureRate
        expr: |
          rate(hotel_payments_total{status="failed"}[5m])
          /
          (rate(hotel_payments_total[5m]) + 0.001)
          > 0.1
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High payment failure rate (> 10%)"

      - alert: SlowBookings
        expr: |
          histogram_quantile(0.95, rate(hotel_booking_duration_seconds_bucket[5m])) > 5
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "P95 booking duration > 5s"
