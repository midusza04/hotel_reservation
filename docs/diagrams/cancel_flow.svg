<svg xmlns="http://www.w3.org/2000/svg" width="950" height="806" viewBox="0 0 950 806">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
    <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
  </marker>
  <filter id="shadow" x="-8%" y="-8%" width="120%" height="130%">
    <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#0f172a" flood-opacity="0.10"/>
  </filter>
</defs>
<rect width="100%" height="100%" rx="20" fill="#f8fafc"/>
<text x="40" y="50" font-family="Segoe UI, Arial" font-size="26" font-weight="700" fill="#0f172a">Przeplyw anulowania rezerwacji</text>
<rect x="44" y="78" width="155" height="72" rx="12" fill="#dbeafe" stroke="#3b82f6" stroke-width="2" filter="url(#shadow)"/>
<text x="58" y="104" font-family="Segoe UI,Arial" font-size="16" font-weight="700" fill="#0f172a">User / SPA</text>
<text x="58" y="124" font-family="Segoe UI,Arial" font-size="13" fill="#475569">Cancel booking</text>
<rect x="258" y="78" width="195" height="72" rx="12" fill="#e0f2fe" stroke="#0284c7" stroke-width="2" filter="url(#shadow)"/>
<text x="272" y="104" font-family="Segoe UI,Arial" font-size="16" font-weight="700" fill="#0f172a">FastAPI</text>
<text x="272" y="124" font-family="Segoe UI,Arial" font-size="13" fill="#475569">JWT + owner check</text>
<rect x="514" y="68" width="252" height="92" rx="12" fill="#ede9fe" stroke="#8b5cf6" stroke-width="2" filter="url(#shadow)"/>
<text x="528" y="94" font-family="Segoe UI,Arial" font-size="16" font-weight="700" fill="#0f172a">BookingCoordinator</text>
<text x="528" y="114" font-family="Segoe UI,Arial" font-size="13" fill="#475569">walidacja · polityka zwrotu</text>
<path d="M 199,114 L 258,114" stroke="#475569" stroke-width="2" fill="none" marker-end="url(#arrow)"/><rect x="192" y="90" width="72" height="22" rx="11" fill="#fff" stroke="#dde2ee" stroke-width="1.5"/><text x="228" y="107" text-anchor="middle" font-family="Segoe UI,Arial" font-size="12" fill="#334155">HTTP</text>
<path d="M 453,114 L 514,114" stroke="#475569" stroke-width="2" fill="none" marker-end="url(#arrow)"/><rect x="447" y="90" width="72" height="22" rx="11" fill="#fff" stroke="#dde2ee" stroke-width="1.5"/><text x="483" y="107" text-anchor="middle" font-family="Segoe UI,Arial" font-size="12" fill="#334155">cancel_booking()</text>
<rect x="96" y="200" width="750" height="106" rx="12" fill="#f8fafc" stroke="#94a3b8" stroke-width="2" filter="url(#shadow)"/>
<text x="110" y="226" font-family="Segoe UI,Arial" font-size="16" font-weight="700" fill="#0f172a">1  weryfikacja wlasciciela</text>
<text x="110" y="246" font-family="Segoe UI,Arial" font-size="13" fill="#475569">sprawdzenie: reservation.user_id == user_id z tokenu JWT</text>
<text x="110" y="265" font-family="Segoe UI,Arial" font-size="13" fill="#475569">jesli niezgodnosc → ok=False, brak dalszych operacji</text>
<path d="M 471,160 L 471,200" stroke="#475569" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
<rect x="96" y="318" width="750" height="106" rx="12" fill="#dcfce7" stroke="#16a34a" stroke-width="2" filter="url(#shadow)"/>
<text x="110" y="344" font-family="Segoe UI,Arial" font-size="16" font-weight="700" fill="#0f172a">2  anulacja w hotelu</text>
<text x="110" y="364" font-family="Segoe UI,Arial" font-size="13" fill="#475569">InventoryActor.cancel_reservation() → HotelActor.cancel_reservation()</text>
<text x="110" y="383" font-family="Segoe UI,Arial" font-size="13" fill="#475569">status = cancelled · available += 1 · snapshot do DB</text>
<path d="M 471,306 L 471,318" stroke="#475569" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
<rect x="96" y="436" width="750" height="106" rx="12" fill="#fef3c7" stroke="#f59e0b" stroke-width="2" filter="url(#shadow)"/>
<text x="110" y="462" font-family="Segoe UI,Arial" font-size="16" font-weight="700" fill="#0f172a">3  polityka zwrotu</text>
<text x="110" y="482" font-family="Segoe UI,Arial" font-size="13" fill="#475569">czas od created_at &lt;= 1h → refund_percent = 100</text>
<text x="110" y="501" font-family="Segoe UI,Arial" font-size="13" fill="#475569">czas od created_at &gt; 1h  → refund_percent = 0</text>
<path d="M 471,424 L 471,436" stroke="#475569" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
<rect x="96" y="554" width="750" height="106" rx="12" fill="#dbeafe" stroke="#3b82f6" stroke-width="2" filter="url(#shadow)"/>
<text x="110" y="580" font-family="Segoe UI,Arial" font-size="16" font-weight="700" fill="#0f172a">4  aktualizacja danych</text>
<text x="110" y="600" font-family="Segoe UI,Arial" font-size="13" fill="#475569">ReservHistory.cancel_reservation() + DB update_reservation_status()</text>
<text x="110" y="619" font-family="Segoe UI,Arial" font-size="13" fill="#475569">AuditLog.log(RESERVATION_CANCELLED) + MetricsActor.inc_cancellation()</text>
<path d="M 471,542 L 471,554" stroke="#475569" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
<rect x="96" y="686" width="750" height="88" rx="12" fill="#e0f2fe" stroke="#0284c7" stroke-width="2" filter="url(#shadow)"/>
<text x="110" y="712" font-family="Segoe UI,Arial" font-size="16" font-weight="700" fill="#0f172a">5  odpowiedz</text>
<text x="110" y="732" font-family="Segoe UI,Arial" font-size="13" fill="#475569">ReservationResponse(ok=True, refund_percent, refund_amount)</text>
<path d="M 471,660 L 471,686" stroke="#475569" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
</svg>